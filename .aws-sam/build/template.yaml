AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Resources:
  ExpenseTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: expenses
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
  CreateExpenseFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/create_expense.handler
      Runtime: python3.9
      Environment:
        Variables:
          TABLE_NAME: expenses
      Policies:
      - DynamoDBCrudPolicy:
          TableName: expenses
      - SNSPublishMessagePolicy:
          TopicName: expense-alert
      Events:
        Api:
          Type: Api
          Properties:
            Path: /expense
            Method: post
      CodeUri: CreateExpenseFunction
    Metadata:
      SamResourceId: CreateExpenseFunction
  GetExpensesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get_expenses.handler
      Runtime: python3.9
      Environment:
        Variables:
          TABLE_NAME: expenses
      Policies:
      - DynamoDBReadPolicy:
          TableName: expenses
      Events:
        GetAPI:
          Type: Api
          Properties:
            Path: /expenses
            Method: get
      CodeUri: GetExpensesFunction
    Metadata:
      SamResourceId: GetExpensesFunction
  DeleteExpenseFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/delete_expense.handler
      Runtime: python3.9
      Environment:
        Variables:
          TABLE_NAME: expenses
      Policies:
      - DynamoDBCrudPolicy:
          TableName: expenses
      Events:
        DeleteAPI:
          Type: Api
          Properties:
            Path: /expense/{id}
            Method: delete
      CodeUri: DeleteExpenseFunction
    Metadata:
      SamResourceId: DeleteExpenseFunction
